name: "ci"

on:
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  Spec:
    uses: "puppetlabs/cat-github-actions/.github/workflows/module_ci.yml@MODULES-11700-puppet9-gem-source"
    with:
      # puppet_litmus -> bolt 4.x -> faraday-patron -> patron builds a libcurl native extension;
      # the runner has no libcurl headers, so install them before bundle (Puppet 9 lane, Ruby 4).
      additional_packages: "libcurl4-openssl-dev"
    secrets: "inherit"

  Acceptance:
    needs: Spec
    uses: "puppetlabs/cat-github-actions/.github/workflows/module_acceptance.yml@main"
    with:
      flags: '--latest-agent'
    secrets: "inherit"
